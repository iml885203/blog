            - listitem [ref=e239]:
              - strong [ref=e240]: 強制 TDD
              - text: ：先寫 failing test，再寫 code，不可跳過
            - listitem [ref=e241]:
              - strong [ref=e242]: 雙層自動 review
              - text: ：先查 spec compliance（有沒有多做/少做），再查程式品質
