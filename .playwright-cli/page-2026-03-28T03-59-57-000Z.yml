                - code [ref=e93]: /claude-api
              - text: ：自動載入當前語言的 Claude API 文件；偵測到
              - code [ref=e94]: anthropic
              - text: 、
              - code [ref=e95]: "@anthropic-ai/sdk"
              - text: 、
              - code [ref=e96]: claude_agent_sdk
