          - list [ref=e75]:
            - listitem [ref=e76]:
              - strong [ref=e77]: Plan Mode
              - text: （Shift+Tab 切換）：AI 先探索 codebase、問問題，不修改 source code，輸出計畫讓你確認後再實作；也可以
              - code [ref=e78]: /plan
              - text: 前綴對單一請求啟用
            - listitem [ref=e79]:
              - strong [ref=e80]:
                - code [ref=e81]: /simplify
              - text: ：自動派三個平行 review agents 找品質問題並修正
            - listitem [ref=e82]:
              - strong [ref=e83]:
                - code [ref=e84]: /batch <instruction>
              - text: ：大規模並行改動（需在 git repository 內），自動拆成 5-30 個 task，每個在獨立 git worktree 執行並可開 PR
            - listitem [ref=e85]:
              - strong [ref=e86]:
                - code [ref=e87]: /loop [interval] <prompt>
              - text: ：定時循環執行，用來 polling deploy 狀態（僅當前 session 有效，關掉即失效）
            - listitem [ref=e88]:
              - strong [ref=e89]:
                - code [ref=e90]: /debug
              - text: ：mid-session 啟用 debug logging，分析日誌找問題根因
            - listitem [ref=e91]:
