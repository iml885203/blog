          - list [ref=e200]:
            - listitem [ref=e201]:
              - strong [ref=e202]: Brainstorming skill
              - text: ：問清楚需求，分段讓你 approve 才繼續
            - listitem [ref=e203]:
              - strong [ref=e204]: git worktree 隔離
              - text: ：先建立 feature 級隔離工作空間，再在其中執行 tasks
            - listitem [ref=e205]:
              - strong [ref=e206]: subagent 逐 task 執行
              - text: ：每個 task 2-5 分鐘，獨立 subagent 逐項完成
            - listitem [ref=e207]:
              - strong [ref=e208]: 強制 TDD
              - text: ：先寫 failing test，再寫 code，不可跳過
            - listitem [ref=e209]:
              - strong [ref=e210]: 雙層自動 review
              - text: ：先查 spec compliance（有沒有多做/少做），再查程式品質
            - listitem [ref=e211]:
              - strong [ref=e212]: Skills 自動觸發
              - text: ：通常會自動推進流程，也可手動用 slash commands 介入
          - heading "工作流程連結到此段落" [level=3] [ref=e213]:
