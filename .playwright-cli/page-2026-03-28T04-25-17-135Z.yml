          - list [ref=e133]:
            - listitem [ref=e134]:
              - strong [ref=e135]: Plan Mode
              - text: （Shift+Tab 切換）：AI 先探索 codebase、問問題，不修改 source code，輸出計畫讓你確認後再實作；也可以
              - code [ref=e136]: /plan
              - text: 前綴對單一請求啟用
            - listitem [ref=e137]:
              - strong [ref=e138]:
                - code [ref=e139]: /simplify
              - text: ：自動派三個平行 review agents 找品質問題並修正
            - listitem [ref=e140]:
              - strong [ref=e141]:
                - code [ref=e142]: /batch <instruction>
              - text: ：大規模並行改動（需在 git repository 內），自動拆成 5-30 個 task，每個在獨立 git worktree 執行並可開 PR
            - listitem [ref=e143]:
              - strong [ref=e144]:
                - code [ref=e145]: /loop [interval] <prompt>
              - text: ：定時循環執行，用來 polling deploy 狀態（僅當前 session 有效，關掉即失效）
            - listitem [ref=e146]:
              - strong [ref=e147]:
                - code [ref=e148]: /debug
              - text: ：mid-session 啟用 debug logging，分析日誌找問題根因
            - listitem [ref=e149]:
              - strong [ref=e150]:
                - code [ref=e151]: /claude-api
              - text: ：自動載入當前語言的 Claude API 文件；偵測到
              - code [ref=e152]: anthropic
              - text: 、
              - code [ref=e153]: "@anthropic-ai/sdk"
              - text: 、
              - code [ref=e154]: claude_agent_sdk
              - text: 匯入時也可自動觸發
            - listitem [ref=e155]:
              - strong [ref=e156]: CLAUDE.md
              - text: ：放專案根目錄，每次 session 自動讀取，存架構決策、開發規範、review checklist
