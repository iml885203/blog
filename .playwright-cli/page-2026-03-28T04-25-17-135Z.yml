          - list [ref=e173]:
            - listitem [ref=e174]:
              - strong [ref=e175]: change 資料夾
              - text: ：每個功能變更建立一個，包含四份 artifacts：
              - code [ref=e176]: proposal.md
              - text: （為什麼做）、
              - code [ref=e177]: specs/
              - text: （規格增刪改）、
              - code [ref=e178]: design.md
              - text: （怎麼做）、
              - code [ref=e179]: tasks.md
              - text: （實作清單）
            - listitem [ref=e180]:
              - strong [ref=e181]: spec delta
              - text: ：只記錄規格的增刪改，不覆蓋整份文件，reviewer 不用翻 code
            - listitem [ref=e182]:
              - strong [ref=e183]: archive 指令
              - text: ：做完後歸檔到
              - code [ref=e184]: openspec/changes/archive/YYYY-MM-DD-.../
              - text: ，保留完整歷史紀錄
            - listitem [ref=e185]:
              - strong [ref=e186]: 工具無關
              - text: ：不需要 API key 或 MCP，Claude Code、Cursor、GitHub Copilot 都能搭配
          - heading "工作流程連結到此段落" [level=3] [ref=e187]:
