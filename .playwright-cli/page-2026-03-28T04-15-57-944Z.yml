          - paragraph [ref=e649]:
            - text: 目前用
            - strong [ref=e650]: OpenSpec + Claude Code 原生
            - text: ，加上 Plan Mode。
          - paragraph [ref=e651]:
            - text: 選 OpenSpec 的原因很實際：最大的痛點是設計決策會消失，OpenSpec 讓每個 change 都留下 proposal 和 design，這個問題基本上消失了。Plan Mode 是零成本的安全帶，任何任務都先開；大規模改動用
            - code [ref=e652]: /batch
            - text: 。
          - paragraph [ref=e653]: Superpowers 的流程太重，大部分任務不值得；gstack 的多角色 review 吸引人，但 28 個 commands 需要時間建立習慣；everything-cc 等哪天 agent 效能真正成為瓶頸再說。問題不是「哪個工具最強」，而是「你現在最卡在哪裡」。
